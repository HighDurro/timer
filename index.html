<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Countdown Fine Giornata</title>
  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: #22c55e;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    .time {
      font-size: 80px;
      font-weight: bold;
    }

    .label {
      font-size: 18px;
      color: #94a3b8;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="time" id="countdown">--:--:--</div>
    <div class="label">tempo alla libertà</div>
  </div>

  <script>
    const END_HOUR = 18;
    const END_MINUTE = 0;

    function updateCountdown() {
      const now = new Date();
      const end = new Date();

      end.setHours(END_HOUR, END_MINUTE, 0);

      let diff = end - now;

      if (diff <= 0) {
        document.getElementById("countdown").textContent = "🎉 LIBERO!";
        return;
      }

      const hours = Math.floor(diff / (1000 * 60 * 60));
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("countdown").textContent =
        `${hours.toString().padStart(2, '0')}:` +
        `${minutes.toString().padStart(2, '0')}:` +
        `${seconds.toString().padStart(2, '0')}`;
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
